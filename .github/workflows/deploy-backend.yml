name: Deploy Backend to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and push Docker image
        working-directory: backend
        run: |
          IMAGE=us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/chc-snowflake-agent/backend:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE

      - name: Deploy to Cloud Run
        run: |
          IMAGE=us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/chc-snowflake-agent/backend:${{ github.sha }}
          gcloud run deploy census-chat-agent \
            --image $IMAGE \
            --region us-central1 \
            --platform managed \
            --service-account chc-snowflake-agent-sa@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --set-secrets "ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,SNOWFLAKE_ACCOUNT=SNOWFLAKE_ACCOUNT:latest,SNOWFLAKE_USER=SNOWFLAKE_USER:latest,SNOWFLAKE_PASSWORD=SNOWFLAKE_PASSWORD:latest,SNOWFLAKE_DATABASE=SNOWFLAKE_DATABASE:latest,SNOWFLAKE_WAREHOUSE=SNOWFLAKE_WAREHOUSE:latest,SNOWFLAKE_SCHEMA=SNOWFLAKE_SCHEMA:latest,JWT_SECRET=JWT_SECRET:latest,USERS=USERS:latest" \
            --set-env-vars "GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},ALLOWED_ORIGINS=https://chc-snowflake-agent.web.app,https://chc-snowflake-agent.firebaseapp.com" \
            --allow-unauthenticated \
            --memory 1Gi \
            --timeout 300
